<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f4f4;
      color: #222;
    }
    .card {
      background: white;
      padding: 2rem 2.5rem;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 600px;
    }
    h1 {
      margin-top: 0;
    }
    p {
      margin-bottom: 0;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <form id="loginForm">
    <label for="username">Username:</label>
    <input type="text" id="username" name="username" required />

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required />

    <button type="submit">Login</button>
  </form>
    
    <p>This HTML page is served from Docker on my server.</p>
    <p>Reverse proxied by Nginx Proxy Manager and published through Cloudflare Tunnel.</p>
  </div>
</body>
<script>
document.getElementById('loginForm').addEventListener('submit', async (event) => {
    event.preventDefault();  // Prevent the form from reloading the page

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    try {
        // Sending POST request to the server with login data
        const response = await fetch('http://localhost:3000/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ username, password }),  // Send data as JSON
        });

        const data = await response.json();  // Parse the JSON response

        if (response.ok) {
            // Successful login
            console.log('Login successful:', data);
            // Redirect to dashboard or another page
            window.location.href = '/dashboard';
        } else {
            // Login failed
            console.error('Login failed:', data.message);
            alert(data.message);  // Show error message
        }
    } catch (error) {
        console.error('Error during login:', error);
        alert('Something went wrong. Please try again.');
    }
});
</script>
</html>
