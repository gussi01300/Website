<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f4f4f4;
      color: #222;
    }
    .card {
      background: white;
      padding: 2rem 2.5rem;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 600px;
    }
    h1 {
      margin-top: 0;
    }
    p {
      margin-bottom: 0;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hailey, do you like me?</h1>
    <button onclick="changeText()">Yes</button>
    <button onclick="changeText2()">No</button>
    <script>
        function changeText() {
            document.getElementById("myText").innerText = "Yes";
        }
        function changeText2() {
            document.getElementById("myText").innerText = "Yes aswell, dummie!";
        }
    </script>

    <p id = "myText"></p>
    
    <p>This HTML page is served from Docker on my server.</p>
    <p>Reverse proxied by Nginx Proxy Manager and published through Cloudflare Tunnel.</p>
  </div>
</body>
</html>
